<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiggy Tracker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="brand-row">
          <div class="logo" aria-hidden="true">
            <img src="icons/MainLogo.png" alt="" />
          </div>
          <div class="brand-text">
            <h1>Swiggy Tracker</h1>
            <p class="brand-sub">Expense Intelligence</p>
          </div>
          <div id="syncState" class="status-dot">Ready</div>
        </div>
      </header>

      <section class="stats" aria-label="Quick stats">
        <article class="stat">
          <p id="statTotal" class="stat-val">₹0</p>
          <p class="stat-label">Total spent</p>
        </article>
        <article class="stat">
          <p id="statOrders" class="stat-val">0</p>
          <p class="stat-label">Orders</p>
        </article>
        <article class="stat">
          <p id="statAvg" class="stat-val">₹0</p>
          <p class="stat-label">Avg. order</p>
        </article>
      </section>

      <section class="spark-section">
        <div class="spark-label">
          <span>Monthly spend</span>
          <em id="sparkMeta">₹0 this month</em>
        </div>
        <div id="sparkBars" class="sparkline" aria-hidden="true"></div>
        <div id="sparkMonths" class="spark-months" aria-hidden="true"></div>
      </section>

      <section class="quick-info">
        <p id="topRestaurant">Top spot: NA - 0 orders</p>
      </section>

      <div class="actions">
        <button id="syncBtn" class="btn btn-primary" type="button">Sync current Swiggy page</button>
        <button id="dashboardBtn" class="btn btn-secondary" type="button">Open full dashboard</button>
      </div>

      <footer class="footer">
        <p id="lastSync" class="last-sync">Last synced never</p>
        <p id="status" class="status-message" aria-live="polite"></p>
      </footer>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
